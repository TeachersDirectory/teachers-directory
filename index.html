function searchName(){
    let input = document.getElementById("search").value;
    input = normalize(input);
    let cards = document.getElementsByClassName("card");

    for(let i=0; i<cards.length; i++){
        let name = cards[i].getElementsByClassName("name")[0].innerText;
        let school = cards[i].getElementsByClassName("school")[0].innerText;
        let blood = cards[i].getElementsByClassName("blood")[0].innerText;

        let normalized = normalize(name + ' ' + school + ' ' + blood);
        cards[i].style.display = normalized.includes(input) ? "" : "none";
    }
}
